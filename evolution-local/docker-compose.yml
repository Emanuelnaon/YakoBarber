services:
    evolution-api:
        image: evoapicloud/evolution-api:v2.1.1
        container_name: evolution_api_yakobarber
        restart: always
        ports:
            - '8080:8080'
        environment:
            - SERVER_URL=http://localhost:8080
            - AUTHENTICATION_TYPE=apikey
            - AUTHENTICATION_API_KEY=YakoBarberSecreto123

            # Base de datos Profesional
            - DATABASE_ENABLED=true
            - DATABASE_PROVIDER=postgresql
            - DATABASE_CONNECTION_URI=postgresql://postgres:root@postgres:5432/evolution?schema=public

            # Caché Profesional
            - CACHE_REDIS_ENABLED=true
            - CACHE_REDIS_URI=redis://redis:6379/6
            - CACHE_REDIS_HOST=redis
            - CACHE_REDIS_PORT=6379
            - CACHE_REDIS_DB=1

            - DELAY_MESSAGES=true

            - WEBSOCKET_ENABLED=false
            - WA_IGNORE_GROUP_MESSAGES=true

            # Versión de WhatsApp para forzar el QR
            - CONFIG_SESSION_PHONE_VERSION=2.3000.1015901307 

        volumes:
            - evolution_instances:/evolution/instances
            - evolution_store:/evolution/store
        depends_on:
            - postgres
            - redis

    postgres:
        image: postgres:15-alpine
        container_name: evolution_postgres
        restart: always
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=root
            - POSTGRES_DB=evolution
        ports:
            - '5432:5432'
        volumes:
            - evolution_db:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        container_name: evolution_redis
        restart: always
        ports:
            - '6379:6379'

# Volúmenes Nativos de Docker (Cero errores de Windows)
volumes:
    evolution_db:
    evolution_instances:
    evolution_store:
