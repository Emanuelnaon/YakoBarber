services:
  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api_yakobarber
    ports:
      - "8080:8080"
    volumes:
      - ./evolution_instances:/evolution/instances
    env_file:
      - .env
    networks:
      - yakobarber_net
    depends_on:
      evolution_postgres:
        condition: service_healthy  # ← Esto obliga a esperar que Postgres esté 100% listo
      evolution_redis:
        condition: service_started

  evolution_postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution_db
    volumes:
      - ./evolution_db:/var/lib/postgresql/data
    networks:
      - yakobarber_net
    healthcheck:                     # ← Este bloque le avisa a Docker cuándo Postgres está sano
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution_redis:
    image: redis:alpine
    container_name: evolution_redis
    ports:
      - "6379:6379"
    networks:
      - yakobarber_net

networks:
  yakobarber_net:
    name: yakobarber_shared_network